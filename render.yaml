# ════════════════════════════════════════════════════════════
# 菜鸟物流查询 — Render Blueprint 部署配置
# ════════════════════════════════════════════════════════════
# 使用方式：
#   1. 把代码推送到 GitHub
#   2. 在 Render Dashboard 点击 "New +" → "Blueprint"
#   3. 选择本仓库，Render 自动识别 render.yaml 并部署
#
# 住宅代理配置（PROXY_LIST）示例：
#   - 自建代理池:  http://user:pass@ip1:port,http://user:pass@ip2:port,...
#   - 住宅代理服务商:
#       静态住宅:   http://user-session-random:pass@gateway.xxx.com:10000
#       动态住宅:   http://user-turn-random:pass@gateway.xxx.com:10000
#   - 免费代理池: 留空 PROXY_LIST，系统启动后自动后台抓取（存活率低，不推荐）
#
# 自定义域名（CNAME 到 Render 分配的 onrender.com 地址）:
#   DNS 设置:  CNAME @  cainiao-server.onrender.com
#   如果使用 Cloudflare，开启 Proxy（橙色云朵）可隐藏真实 IP
# ============================================================
services:
  # Web Service：菜鸟物流追踪 API
  - type: web
    name: cainiao-server
    runtime: docker
    repo: https://github.com/yuan680/cainiao-server.git
    region: hongkong  # 新加坡或香港，离中国近延迟低
    plan: free        # 免费计划：512MB RAM / 1 vCPU

    branch: master
    dockerfilePath: ./Dockerfile

    # 健康检查路径（Render 自动轮询）
    healthCheckPath: /health

    # 环境变量
    envVars:
      - key: PORT
        value: 58080
      - key: CHROMIUM_FLAGS
        value: "--no-sandbox --disable-dev-shm-usage --single-process --disable-gpu --no-zygote --js-flags=--max_old_space_size=256"
      - key: USE_PLAYWRIGHT
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: PROXY_MODE
        value: rotate
      - key: TZ
        value: Asia/Shanghai

      # ──── Playwright Worker 数量（每 Worker ≈ 120-180MB RAM） ────
      # Render 免费计划 512MB → 建议 1 个 Worker，留足够内存给系统
      - key: PLAYWRIGHT_WORKERS
        value: "1"

      # ──── 代理池配置（取消注释并填写你的代理） ────
      # - key: PROXY_LIST
      #   value: "http://user:pass@gateway1:port,http://user:pass@gateway2:port"

      # ──── 日志文件（云端仅 stdout，Render Dashboard 可查看） ────
      # - key: LOG_FILE
      #   value: ""

      # ──── Google Sheets 写入（可选） ────
      # - key: GOOGLE_SHEET_ID
      #   value: "your_sheet_id"
      # - key: GOOGLE_SHEET_CREDENTIALS
      #   value: "/app/gsheet_creds.json"

    # 自动缩放 — 免费计划始终 1 实例
    scaling:
      minInstances: 1
      maxInstances: 1

  # ──────────────────────────────────────────────
  # Cron Job：定时执行（例如每 5 分钟查询一次）
  # 需搭配 cainiao_server.py 的批量查询接口使用
  # ──────────────────────────────────────────────
  # - type: cron
  #   name: cainiao-track-cron
  #   runtime: docker
  #   repo: https://github.com/yuan680/cainiao-server.git
  #   region: hongkong
  #   plan: free
  #   branch: master
  #   dockerfilePath: ./Dockerfile
  #   schedule: "*/5 * * * *"
  #   envVars:
  #     - key: PORT
  #       value: 58080
  #     - key: CHROMIUM_FLAGS
  #       value: "--no-sandbox --disable-dev-shm-usage --single-process --disable-gpu --no-zygote --js-flags=--max_old_space_size=256"
