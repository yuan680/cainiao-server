# ════════════════════════════════════════════════════════════
# 菜鸟物流查询 — Render Blueprint 部署配置
# ════════════════════════════════════════════════════════════
services:
  # Web Service：菜鸟物流追踪 API
  - type: web
    name: cainiao-server
    runtime: docker
    repo: https://github.com/yuan680/cainiao-server.git
    region: hongkong  # 新加坡或香港，离中国近延迟低
    plan: free        # 免费计划：512MB RAM / 1 vCPU

    branch: master
    dockerfilePath: ./Dockerfile

    # 健康检查路径（Render 自动轮询）
    healthCheckPath: /health

    # 环境变量
    envVars:
      - key: PORT
        value: 58080
      - key: CHROMIUM_FLAGS
        value: "--no-sandbox --disable-dev-shm-usage --single-process --disable-gpu --no-zygote --js-flags=--max_old_space_size=256"
      - key: USE_PLAYWRIGHT
        value: "true"
      - key: LOG_LEVEL
        value: INFO
      - key: TZ
        value: Asia/Shanghai

    # 自动缩放 — 免费计划始终 1 实例
    scaling:
      minInstances: 1
      maxInstances: 1

  # ──────────────────────────────────────────────
  # Cron Job：定时执行（例如每 5 分钟查询一次）
  # 需搭配 cainiao_server.py 的批量查询接口使用
  # ──────────────────────────────────────────────
  # - type: cron
  #   name: cainiao-track-cron
  #   runtime: docker
  #   repo: https://github.com/yuan680/cainiao-server.git
  #   region: hongkong
  #   plan: free
  #   branch: master
  #   dockerfilePath: ./Dockerfile
  #   schedule: "*/5 * * * *"
  #   envVars:
  #     - key: PORT
  #       value: 58080
  #     - key: CHROMIUM_FLAGS
  #       value: "--no-sandbox --disable-dev-shm-usage --single-process --disable-gpu --no-zygote --js-flags=--max_old_space_size=256"
